<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>Arquitetura do app de PC do Modue</title>
  <desc>Módulos físicos conversam por USB serial bidirecional com um app Electron no PC, que integra com Discord RPC, Spotify API e o volume do sistema.</desc>

  <text x="360" y="28" text-anchor="middle" fill="#888888" font-size="15" font-weight="600">Arquitetura — Modue + app de PC</text>

  <!-- Hardware -->
  <g fill="#6B5BD6">
    <rect x="150" y="48" width="180" height="62" rx="12"/>
    <rect x="390" y="48" width="180" height="62" rx="12"/>
  </g>
  <text x="240" y="74" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Módulo Discord</text>
  <text x="240" y="94" text-anchor="middle" fill="#dcd8f7" font-size="12">fader · mute · deafen</text>
  <text x="480" y="74" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Módulo Spotify</text>
  <text x="480" y="94" text-anchor="middle" fill="#dcd8f7" font-size="12">fader · play · skip</text>

  <line x1="360" y1="110" x2="360" y2="158" stroke="#888888" stroke-width="2" marker-end="url(#a)" marker-start="url(#a)"/>
  <text x="372" y="138" fill="#888888" font-size="12">USB serial — bidirecional</text>

  <!-- App PC -->
  <rect x="96" y="160" width="528" height="150" rx="14" fill="#13314c" stroke="#2F6FB3" stroke-width="1.5"/>
  <text x="360" y="186" text-anchor="middle" fill="#9ec7f0" font-size="15" font-weight="600">App de PC (Electron)</text>

  <g fill="#2F6FB3">
    <rect x="116" y="202" width="158" height="92" rx="10"/>
    <rect x="281" y="202" width="158" height="92" rx="10"/>
    <rect x="446" y="202" width="158" height="92" rx="10"/>
  </g>
  <text x="195" y="234" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Gerenciador</text>
  <text x="195" y="254" text-anchor="middle" fill="#cfe2f7" font-size="11">módulos · perfis · app</text>
  <text x="360" y="234" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Protocolo + imagens</text>
  <text x="360" y="254" text-anchor="middle" fill="#cfe2f7" font-size="11">envia logo / capa</text>
  <text x="525" y="234" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Integrações</text>
  <text x="525" y="254" text-anchor="middle" fill="#cfe2f7" font-size="11">estado em tempo real</text>

  <line x1="195" y1="310" x2="155" y2="372" stroke="#888888" stroke-width="2" marker-end="url(#a)"/>
  <line x1="360" y1="310" x2="360" y2="372" stroke="#888888" stroke-width="2" marker-end="url(#a)"/>
  <line x1="525" y1="310" x2="565" y2="372" stroke="#888888" stroke-width="2" marker-end="url(#a)"/>

  <!-- Serviços externos -->
  <g fill="#1AA179">
    <rect x="60" y="374" width="190" height="66" rx="12"/>
    <rect x="265" y="374" width="190" height="66" rx="12"/>
    <rect x="470" y="374" width="190" height="66" rx="12"/>
  </g>
  <text x="155" y="402" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Discord RPC</text>
  <text x="155" y="422" text-anchor="middle" fill="#d3f0e6" font-size="11">mute · deafen · volume</text>
  <text x="360" y="402" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Spotify API</text>
  <text x="360" y="422" text-anchor="middle" fill="#d3f0e6" font-size="11">play · skip · capa</text>
  <text x="565" y="402" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Volume do SO</text>
  <text x="565" y="422" text-anchor="middle" fill="#d3f0e6" font-size="11">por-app (Win) / sistema</text>

  <text x="360" y="470" text-anchor="middle" fill="#888888" font-size="11">Roxo = hardware · Azul = app PC · Verde = serviços externos</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#888888" stroke-width="1.6"/>
    </marker>
  </defs>
</svg>
